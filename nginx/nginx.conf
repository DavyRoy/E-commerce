http {
    # Включаем определение MIME типов
    include mime.types;
    default_type application/octet-stream;

    # Формат логов
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Логи доступа и ошибок (stdout/stderr для Docker)
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Оптимизация передачи файлов
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Таймауты
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/rss+xml font/truetype font/opentype
        application/vnd.ms-fontobject image/svg+xml;

server {
    listen <port>;
    server_name localhost;

    # Корневая директория для файлов
    root /Users/sergeylapshov/Desktop/techstore/frontend;
    index index.html;          # index.html

    # Главная страница
    location / {
        try_files $uri $uri/ =404;
    }

    # Статические файлы с кэшированием
    location /static/ {
        expires 30d;            # 30d, 1h, 1y
        add_header Cache-Control "public";   # "public"
    }
}